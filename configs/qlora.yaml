model:
  name: Qwen/Qwen2.5-VL-3B-Instruct

training:
  method: qlora
  load_in_4bit: true
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  learning_rate: 0.0001
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_samples: 300
  seed: 42

data:
  train_path: data/processed/sft_train.jsonl
  val_path: data/processed/sft_val.jsonl

sft:
  source_train_split_path: data/processed/train_split.jsonl
  source_val_split_path: data/processed/val_split.jsonl
  processed_law_path: data/processed/law_articles.jsonl
  train_output_path: data/processed/sft_train.jsonl
  val_output_path: data/processed/sft_val.jsonl
  evidence_strategy: oracle
  prompt_variant: text_rag

output:
  checkpoint_dir: checkpoints/qlora_adapter
