project:
  name: traffic-legal-vlm
  seed: 42

data:
  law_path: data/raw/law_db/vlsp2025_law_new.json
  law_image_dir: data/raw/law_db/images.fld

  train_path: data/raw/train_data/vlsp_2025_train.json
  train_image_dir: data/raw/train_data/train_images

  public_test_task1_path: data/raw/public_test/vlsp_2025_public_test_task1.json
  public_test_task2_path: data/raw/public_test/vlsp_2025_public_test_task2.json
  public_test_image_dir: data/raw/public_test/public_test_images

  private_test_dir: data/raw/private_test
  private_test_image_dir: data/raw/private_test/private_test_images

  processed_law_path: data/processed/law_articles.jsonl
  train_split_path: data/processed/train_split.jsonl
  val_split_path: data/processed/val_split.jsonl
  regression_path: data/processed/regression_set.json

qdrant:
  url: http://localhost:6333
  collection_name: traffic_law

retrieval:
  top_k: 5
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  batch_size: 64
  text_weight: 0.7
  image_weight: 0.3

model:
  name: Qwen/Qwen2.5-VL-3B-Instruct
  temperature: 0.0
  max_new_tokens: 512

output:
  dir: data/outputs
