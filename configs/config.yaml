project:
  name: traffic-legal-vlm
  seed: 42

data:
  law_path: data/raw/law_db/vlsp2025_law_new.json
  train_path: data/raw/train/vlsp_2025_train.json
  image_dir: data/raw/train/train_images
  processed_law_path: data/processed/law_articles.jsonl
  train_split_path: data/processed/train_split.jsonl
  val_split_path: data/processed/val_split.jsonl
  regression_path: data/processed/regression_set.json

qdrant:
  url: http://localhost:6333
  collection_name: traffic_law

retrieval:
  top_k: 5
  text_weight: 0.7
  image_weight: 0.3

model:
  name: Qwen/Qwen2.5-VL-3B-Instruct
  temperature: 0.0
  max_new_tokens: 512

output:
  dir: data/outputs
