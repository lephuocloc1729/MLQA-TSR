extends: ../config.yaml

experiment:
  name: w2_b4_few_shot_rag
  label: B4_few_shot_rag
  description: Fused legal evidence plus top-3 retrieved solved examples.
  split: val
  mock: true
  retrieval_strategy: fusion
  prompt_variant: few_shot_rag
  use_examples: true
  example_top_k: 3
  example_retrieval_mode: fusion
  output_path: data/outputs/experiments/w2_b4_few_shot_rag.jsonl
  metrics_path: data/outputs/experiments/w2_b4_few_shot_rag_metrics.json

retrieval:
  top_k: 5
  example_top_k: 3
  fusion_allow_example_failure: false

prompt:
  variant: few_shot_rag
  top_examples: 3
