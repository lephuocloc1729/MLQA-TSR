extends: lowcost_task2_qwen_answer_only.yaml

experiment:
  name: lowcost_task2_qwen_answer_only_no_examples
  label: LowCost_Task2_Qwen_AnswerOnly_NoExamples
  description: Qwen2.5-VL Task 2 benchmark with answer-only prompt and no retrieved solved examples.
  split: val
  mock: false
  retrieval_strategy: text
  prompt_variant: lowcost_answer_only_fewshot
  use_examples: false
  example_top_k: 0
  example_retrieval_mode: fusion
  output_path: data/outputs/experiments/lowcost_task2_qwen_answer_only_no_examples.jsonl
  metrics_path: data/outputs/experiments/lowcost_task2_qwen_answer_only_no_examples_metrics.json

prompt:
  variant: lowcost_answer_only_fewshot
  top_examples: 0
  max_example_chars: 900

w6_lowcost:
  answer_only_prompt: true
  examples_enabled: false
  staged_limits: [5, 20, full]
  compare_against:
    - configs/experiments/vlsp_task2_qwen25vl_7b_fusion_text.yaml
    - configs/experiments/lowcost_task2_qwen_answer_only.yaml
  submission_candidate_after_validation: true
