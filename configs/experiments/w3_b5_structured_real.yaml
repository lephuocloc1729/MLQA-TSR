extends: ../config.yaml

experiment:
  name: w3_b5_structured_real
  label: W3_B5_structured_real
  description: Real VLM run with direct LawDB retrieval and structured legal explanation.
  split: val
  mock: false
  retrieval_strategy: text
  prompt_variant: structured_legal_rag
  output_path: data/outputs/experiments/w3_b5_structured_real.jsonl
  metrics_path: data/outputs/experiments/w3_b5_structured_real_metrics.json

model:
  backend: openai_compatible
  name_env: OPENAI_COMPATIBLE_MODEL
  api_key_env: OPENAI_COMPATIBLE_API_KEY
  base_url_env: OPENAI_COMPATIBLE_BASE_URL
  temperature: 0.0
  max_new_tokens: 512
  include_image: true

prompt:
  variant: structured_legal_rag
