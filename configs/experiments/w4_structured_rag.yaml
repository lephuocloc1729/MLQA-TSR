extends: ../config.yaml

retrieval_freeze:
  version: retrieval-final-v1
  locked_split: data/processed/val_split.jsonl
  locked_split_manifest: data/processed/split_manifest.json

final_validation:
  comparable_group: locked-val-v1
  role: real_base_structured_legal_rag
  report_as_final_model: true
  source_of_truth: metrics_json
  main_product_candidate: true

experiment:
  name: w4_structured_rag
  label: W4_structured_rag
  description: Final validation real/base VLM run with frozen fused retrieval and structured legal reasoning prompt.
  split: val
  mock: false
  retrieval_strategy: fusion
  prompt_variant: structured_legal_rag
  example_retrieval_mode: fusion
  output_path: data/outputs/experiments/w4_structured_rag.jsonl
  metrics_path: data/outputs/experiments/w4_structured_rag_metrics.json

model:
  backend: openai_compatible
  name_env: OPENAI_COMPATIBLE_MODEL
  api_key_env: OPENAI_COMPATIBLE_API_KEY
  base_url_env: OPENAI_COMPATIBLE_BASE_URL
  temperature: 0.0
  max_new_tokens: 512
  include_image: true

prompt:
  variant: structured_legal_rag

retrieval:
  top_k: 5
  example_top_k: 3
  example_candidate_multiplier: 5
  text_weight: 0.7
  image_weight: 0.3
  fusion_direct_weight: 1.0
  fusion_example_vote_weight: 1.0
  fusion_allow_example_failure: false
