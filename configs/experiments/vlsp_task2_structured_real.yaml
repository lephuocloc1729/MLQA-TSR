extends: ../config.yaml

experiment:
  name: vlsp_task2_structured_real
  label: VLSP_Task2_Structured_Real
  description: Real VLM predictions for VLSP Task 2 with structured legal RAG.
  mock: false
  retrieval_strategy: fusion
  prompt_variant: structured_legal_rag
  example_retrieval_mode: fusion
  output_path: data/outputs/competitions/vlsp_task2_predictions.jsonl

model:
  backend: openai_compatible
  name_env: OPENAI_COMPATIBLE_MODEL
  api_key_env: OPENAI_COMPATIBLE_API_KEY
  base_url_env: OPENAI_COMPATIBLE_BASE_URL
  temperature: 0.0
  max_new_tokens: 512
  include_image: true

prompt:
  variant: structured_legal_rag

retrieval:
  top_k: 5
  example_top_k: 3
  example_candidate_multiplier: 5
  text_weight: 0.7
  image_weight: 0.3
  fusion_direct_weight: 1.0
  fusion_example_vote_weight: 1.0
  fusion_allow_example_failure: true
