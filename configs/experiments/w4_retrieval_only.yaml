extends: ../config.yaml

retrieval_freeze:
  version: retrieval-final-v1
  locked_split: data/processed/val_split.jsonl
  locked_split_manifest: data/processed/split_manifest.json
  rationale: >
    Week-4 evidence-inspection row using the frozen fused retrieval stack.
    This run is useful for retrieval Precision/Recall/F2 and case analysis,
    but its mock QA output is not model quality.

final_validation:
  comparable_group: locked-val-v1
  role: retrieval_only_evidence_inspection
  report_as_final_model: false
  source_of_truth: metrics_json

experiment:
  name: w4_retrieval_only
  label: W4_retrieval_only
  description: Final validation retrieval-only evidence inspection with frozen fusion.
  split: val
  mock: true
  retrieval_strategy: fusion
  prompt_variant: text_rag
  example_retrieval_mode: fusion
  output_path: data/outputs/experiments/w4_retrieval_only.jsonl
  metrics_path: data/outputs/experiments/w4_retrieval_only_metrics.json

retrieval:
  top_k: 5
  example_top_k: 3
  example_candidate_multiplier: 5
  text_weight: 0.7
  image_weight: 0.3
  fusion_direct_weight: 1.0
  fusion_example_vote_weight: 1.0
  fusion_allow_example_failure: false

prompt:
  variant: text_rag
