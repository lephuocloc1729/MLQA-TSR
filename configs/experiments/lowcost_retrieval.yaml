extends: ../config.yaml

experiment:
  name: lowcost_retrieval_features
  label: LowCost_Feature_Cache
  description: Cache low-cost text, whole-image, and object-crop features before retrieval indexing.
  mock: false

lowcost_features:
  text_model: jinaai/jina-embeddings-v3
  image_model: nvidia/C-RADIOv2-B
  object_model: google/owlv2-large-patch14-ensemble
  object_threshold: 0.3
  image_max_size: 1536
  device:
  object_labels:
    - traffic sign
    - rectangle sign
    - triangle sign
    - square sign
    - circle sign
    - octagon sign
    - stop sign

lowcost_retrieval:
  collection_name: traffic_train_examples_lowcost
  batch_size: 64
  index_manifest_path: data/outputs/lowcost_features/index_manifest.json
  dimensions:
    text_vector: 1024
    image_general_feature_vector: 2304
    image_object_feature_vector: 2304

output:
  lowcost_feature_dir: data/outputs/lowcost_features
