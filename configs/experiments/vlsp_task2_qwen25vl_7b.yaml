extends: ../config.yaml

experiment:
  name: vlsp_task2_qwen25vl_7b
  label: VLSP_Task2_Qwen2.5VL_7B
  description: Real Qwen2.5-VL-7B structured legal RAG validation benchmark.
  split: val
  mock: false
  retrieval_strategy: fusion
  prompt_variant: structured_legal_rag
  example_retrieval_mode: fusion
  output_path: data/outputs/experiments/vlsp_task2_qwen25vl_7b.jsonl
  metrics_path: data/outputs/experiments/vlsp_task2_qwen25vl_7b_metrics.json

model:
  backend: openai_compatible
  name: Qwen/Qwen2.5-VL-7B-Instruct
  name_env: OPENAI_COMPATIBLE_MODEL
  api_key_env: OPENAI_COMPATIBLE_API_KEY
  base_url_env: OPENAI_COMPATIBLE_BASE_URL
  gpu_host_env: QWEN_VL_GPU_HOST
  serving: openai-compatible
  generation_config: vllm
  dtype: float16
  quantization: none
  temperature: 0.0
  max_new_tokens: 512
  include_image: true
  request_timeout_seconds: 180
  max_retries: 2
  retry_sleep_seconds: 0.5

prompt:
  variant: structured_legal_rag
  max_evidence_chars: 1000

retrieval:
  top_k: 5
  example_top_k: 3
  example_candidate_multiplier: 5
  text_weight: 0.7
  image_weight: 0.3
  fusion_direct_weight: 1.0
  fusion_example_vote_weight: 1.0
  fusion_allow_example_failure: true

w5_real_vlm:
  preferred_model: true
  staged_limits: [1, 10, full]
  fallback_config: configs/experiments/vlsp_task2_qwen25vl_3b.yaml
  submission_candidate_after_validation: true
