extends: ../config.yaml

retrieval_freeze:
  version: retrieval-final-v1
  locked_split: data/processed/val_split.jsonl
  locked_split_manifest: data/processed/split_manifest.json

final_validation:
  comparable_group: locked-val-v1
  role: real_base_text_rag
  report_as_final_model: true
  source_of_truth: metrics_json

experiment:
  name: w4_text_rag_real
  label: W4_text_rag_real
  description: Final validation real/base VLM run with direct LawDB text retrieval.
  split: val
  mock: false
  retrieval_strategy: text
  prompt_variant: text_rag
  output_path: data/outputs/experiments/w4_text_rag_real.jsonl
  metrics_path: data/outputs/experiments/w4_text_rag_real_metrics.json

model:
  backend: openai_compatible
  name_env: OPENAI_COMPATIBLE_MODEL
  api_key_env: OPENAI_COMPATIBLE_API_KEY
  base_url_env: OPENAI_COMPATIBLE_BASE_URL
  temperature: 0.0
  max_new_tokens: 512
  include_image: true

prompt:
  variant: text_rag

retrieval:
  top_k: 5
