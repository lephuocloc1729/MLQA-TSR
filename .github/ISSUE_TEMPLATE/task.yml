name: Four-week implementation task
description: Create a scoped implementation, experiment, or documentation task
title: "[W?-??] "
labels: []
body:
  - type: input
    id: plan_key
    attributes:
      label: Plan key
      description: Stable key from docs/4-week-execution-plan.md, such as W2-03.
      placeholder: W2-03
    validations:
      required: true

  - type: dropdown
    id: workstream
    attributes:
      label: Workstream
      options:
        - Data
        - Retrieval / Vision
        - VLM / Prompting
        - Training
        - Evaluation
        - Demo / Integration
        - Documentation
    validations:
      required: true

  - type: input
    id: owner_reviewer
    attributes:
      label: Owner and reviewer
      placeholder: Owner M1; reviewer M4
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe one observable outcome, not a list of technologies.
    validations:
      required: true

  - type: textarea
    id: project_files
    attributes:
      label: Project files to change
      description: List exact paths and flag shared files explicitly.
      placeholder: |
        - src/data_utils.py
        - tests/test_data_utils.py (new)
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Reference files
      description: List exact files in either reference project and what to learn from each.
      placeholder: |
        - ../LexiSignVQA-main/src/core/lawdb/preprocess_lawdb_infos.py: article traversal
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and blockers
      placeholder: Depends on W1-02; needs CUDA GPU for the full run.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use testable checkboxes.
      placeholder: |
        - [ ] Output contains exactly 402 articles.
        - [ ] Unit tests pass without raw data in CI.
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification commands and evidence
      placeholder: |
        python -m pytest tests/test_data_utils.py -q
        python -m src.data_utils --mode preprocess
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Data and experiment safety
      options:
        - label: I will not commit raw VLSP data, secrets, model weights, or local caches.
          required: true
        - label: I will not use validation samples as training data or few-shot examples.
          required: true
