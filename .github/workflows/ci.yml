name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lightweight-tests:
    name: Lightweight Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML==6.0.3 pydantic==2.13.4 pytest==9.1.0

      - name: Validate issue template YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path(".github/ISSUE_TEMPLATE/task.yml")
          data = yaml.safe_load(path.read_text(encoding="utf-8"))
          assert data["name"] == "Four-week implementation task"
          assert any(item.get("id") == "verification" for item in data["body"])
          PY

      - name: Run schema tests
        run: make ci-test

      - name: Check whitespace
        run: git diff --check
